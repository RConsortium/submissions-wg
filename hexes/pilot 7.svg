<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_2" data-name="Pilot 7 - Synthetic Clinical Data Simulation" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 419.9">
  <defs>
    <style>
      .p7-bg        { fill: #EEF4FF; stroke-width: 0px; }
      .p7-border    { stroke: #2b50a2; stroke-miterlimit: 10; stroke-width: 8px; fill: #EEF4FF; }
      .p7-banner    { fill: #1565C0; stroke-width: 0px; }
      .p7-banner-dk { fill: #0D47A1; stroke-width: 0px; }
      .p7-white     { fill: #fff; stroke-width: 0px; }
      .p7-grid      { stroke: #c0cfe8; stroke-width: 1px; fill: none; }
      .p7-axis      { stroke: #2b50a2; stroke-width: 1.5px; fill: none; stroke-linecap: round; }
      /* Bell curve / distribution */
      .p7-curve     { stroke: #1565C0; stroke-width: 2.5px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .p7-area      { fill: #90CAF9; opacity: 0.45; stroke-width: 0px; }
      /* Simulated scatter dots */
      .p7-dot-obs   { fill: #1565C0; stroke-width: 0px; }
      .p7-dot-sim   { fill: #42A5F5; opacity: 0.7; stroke-width: 0px; }
      /* Real vs Sim legend */
      .p7-leg-line  { stroke: #1565C0; stroke-width: 2px; fill: none; }
      .p7-leg-dash  { stroke: #42A5F5; stroke-width: 2px; fill: none; stroke-dasharray: 5,3; }
      /* Text styles */
      .p7-title {
        font-family: Cousine-Bold, Cousine;
        font-weight: 700;
        font-size: 20px;
        fill: #fff;
        isolation: isolate;
      }
      .p7-subtitle {
        font-family: Cousine-Bold, Cousine;
        font-weight: 700;
        font-size: 14px;
        fill: rgba(255,255,255,0.88);
        isolation: isolate;
      }
      .p7-label {
        font-family: Cousine-Bold, Cousine;
        font-weight: 700;
        font-size: 21px;
        fill: #1565C0;
        isolation: isolate;
      }
      .p7-rconsortium {
        font-family: Hack-Regular, Hack;
        font-size: 14px;
        fill: #fff;
        isolation: isolate;
      }
    </style>
  </defs>
