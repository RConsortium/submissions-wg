      }
      .p7-label {
        font-family: Cousine-Bold, Cousine;
        font-weight: 700;
        font-size: 21px;
        fill: #1565C0;
        isolation: isolate;
      }
      .p7-footer {
        font-family: Cousine-Bold, Cousine;
        font-size: 11px;
        fill: #1565C0;
        isolation: isolate;
      }
