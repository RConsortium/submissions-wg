      .p7-title {
        font-family: Cousine-Bold, Cousine;
        font-weight: 700;
        font-size: 20px;
        fill: #fff;
        isolation: isolate;
      }
      .p7-subtitle {
        font-family: Cousine-Bold, Cousine;
        font-weight: 700;
        font-size: 14px;
        fill: rgba(255,255,255,0.88);
